<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>FocusPulse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <span class="logo">⚡</span>
        <h1>FocusPulse</h1>
      </div>
      <div class="header-right">
        <button id="btn-context-rules" class="icon-btn" title="Context Rules">📍</button>
        <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
      </div>
    </header>

    <!-- Quick Add -->
    <div class="quick-add">
      <input type="text" id="quick-add-input" placeholder="Add a task..." autocomplete="off">
      <button id="quick-add-btn" title="Add task">+</button>
    </div>

    <!-- Add Task Form (hidden by default) -->
    <div id="add-task-form" class="task-form hidden">
      <div class="form-row">
        <input type="text" id="task-title" placeholder="Task title *" autocomplete="off">
      </div>
      <div class="form-row">
        <textarea id="task-desc" placeholder="Description (optional)" rows="2"></textarea>
      </div>
      <div class="form-row form-row-multi">
        <select id="task-priority">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <input type="datetime-local" id="task-due">
      </div>
      <div class="form-row">
        <select id="task-recurrence">
          <option value="">No repeat</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="custom">Custom...</option>
        </select>
        <input type="number" id="task-recurrence-days" placeholder="Every N days" min="1" class="hidden" style="width: 120px;">
      </div>
      <div class="form-row">
        <input type="text" id="task-context" placeholder="Context domain (e.g. linkedin.com)">
      </div>
      <div class="form-actions">
        <button id="form-cancel" class="btn btn-secondary">Cancel</button>
        <button id="form-save" class="btn btn-primary">Save Task</button>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Done</button>
      <select id="sort-select" class="sort-select">
        <option value="due">Sort: Due Date</option>
        <option value="priority">Sort: Priority</option>
        <option value="created">Sort: Created</option>
      </select>
    </div>

    <!-- Task List -->
    <div id="task-list" class="task-list">
      <div class="empty-state">
        <span class="empty-icon">📋</span>
        <p>No tasks yet. Add one above!</p>
      </div>
    </div>

    <!-- Settings Panel (hidden by default) -->
    <div id="settings-panel" class="panel hidden">
      <div class="panel-header">
        <h2>Settings</h2>
        <button id="settings-close" class="icon-btn">✕</button>
      </div>
      <div class="panel-body">
        <div class="setting-item">
          <label for="pref-notification-style">Notification Style</label>
          <select id="pref-notification-style">
            <option value="soft">Soft (auto-dismiss)</option>
            <option value="standard" selected>Standard</option>
            <option value="persistent">Persistent (until dismissed)</option>
          </select>
        </div>
        <div class="setting-item">
          <label for="pref-snooze-duration">Snooze Duration (minutes)</label>
          <input type="number" id="pref-snooze-duration" min="1" max="120" value="10">
        </div>
        <div class="setting-item">
          <label for="pref-context-cooldown">Context Cooldown (minutes)</label>
          <input type="number" id="pref-context-cooldown" min="5" max="480" value="30">
        </div>
        <div class="setting-actions">
          <button id="save-settings" class="btn btn-primary">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Context Rules Panel (hidden by default) -->
    <div id="context-panel" class="panel hidden">
      <div class="panel-header">
        <h2>Context Rules</h2>
        <button id="context-close" class="icon-btn">✕</button>
      </div>
      <div class="panel-body">
        <div id="context-rules-list"></div>
        <div class="context-add">
          <p class="context-hint">Assign websites to tasks so you get reminded when visiting them.</p>
        </div>
      </div>
    </div>

    <!-- Task Detail Panel (hidden by default) -->
    <div id="detail-panel" class="panel hidden">
      <div class="panel-header">
        <h2>Task Details</h2>
        <button id="detail-close" class="icon-btn">✕</button>
      </div>
      <div class="panel-body" id="detail-content"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
